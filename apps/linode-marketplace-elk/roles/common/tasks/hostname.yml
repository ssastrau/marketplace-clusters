---
- name: Update /etc/hosts file
  blockinfile:
    path: /etc/hosts
    marker: "# {mark} ELK STACK"
    block: |
      #jinja2: trim_blocks:False
      {%- for count in range(kibana_cluster_size) %}
      {{ data.kibana[count].instance.ip_priv1 }} {{ data.kibana[count].instance.hostname }} kibana-{{ count + 1 }}
      {%- endfor %}
      {%- for count in range(elasticsearch_cluster_size) %}
      {{ data.elasticsearch[count].instance.ip_priv1 }} {{ data.elasticsearch[count].instance.hostname }} elasticsearch-{{ count + 1 }}
      {%- endfor %}
      {%- for count in range(logstash_cluster_size) %}
      {{ data.logstash[count].instance.ip_priv1 }} {{ data.logstash[count].instance.hostname }} logstash-{{ count + 1 }}
      {%- endfor %}

# Each node identifies itself by the private IP on its own NIC, then looks up
# its entry across data.elasticsearch / data.logstash / data.kibana. Replaces
# the run_once + delegate_to: "{{ item }}" + loop idiom, which collapsed onto
# the provisioner on newer ansible-core.
- name: Determine this node's private IP
  set_fact:
    node_private_ip: "{{ ansible_all_ipv4_addresses | select('match', '^(10\\.|192\\.168\\.|172\\.(1[6-9]|2[0-9]|3[01])\\.)') | first }}"

- name: Identify this node's entry in the cluster topology
  set_fact:
    elk_self: >-
      {{ (data.elasticsearch + data.logstash + data.kibana)
      | map(attribute='instance')
      | selectattr('ip_priv1', 'equalto', node_private_ip) | first }}

- name: Verify this node was matched in the cluster topology
  assert:
    that:
      - elk_self is defined
      - elk_self.ip_priv1 == node_private_ip
    fail_msg: "Could not match this node's private IP {{ node_private_ip }} to any data entry"

- name: Configure hostnames
  hostname:
    use: systemd
    name: "{{ elk_self.hostname }}"
