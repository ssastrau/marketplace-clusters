---

# Create cert directory in cluster. Each node acts on itself (guarded by group
# membership) instead of the run_once + delegate_to: "{{ item }}" + loop idiom,
# which collapsed onto the provisioner on newer ansible-core. Cert files are
# read from the control node (provisioner) where ssl.yml generated them.
- name: Create Elasticsearch ssl directory
  file:
    path: "{{ elasticsearch_ssl_directory }}"
    state: directory
    mode: '0755'
  when: inventory_hostname in groups['elasticsearch']

- name: Create Logstsh ssl directory
  file:
    path: "{{ logstash_ssl_directory }}"
    state: directory
    mode: '0755'
  when: inventory_hostname in groups['logstash']

- name: Create Kibana ssl directory
  file:
    path: "{{ kibana_ssl_directory }}"
    state: directory
    mode: '0755'
  when: inventory_hostname in groups['provisioner']

# Copy over certs to cluster

# Elasticsearch
- name: Copy Elasticsearch cert
  copy:
    src: "{{ cluster_ssl_directory }}/{{ elk_self.hostname }}/{{ elk_self.hostname }}.crt"
    dest: "{{ elasticsearch_ssl_directory }}/{{ elk_self.hostname }}.crt"
    owner: elasticsearch
    group: elasticsearch
    mode: '0664'
  when: inventory_hostname in groups['elasticsearch']

- name: Copy Elasticsearch key
  copy:
    src: "{{ cluster_ssl_directory }}/{{ elk_self.hostname }}/{{ elk_self.hostname }}.key"
    dest: "{{ elasticsearch_ssl_directory }}/{{ elk_self.hostname }}.key"
    owner: elasticsearch
    group: elasticsearch
    mode: '0600'
  when: inventory_hostname in groups['elasticsearch']

- name: Copy Elasticsearch CSR
  copy:
    src: "{{ cluster_ssl_directory }}/{{ elk_self.hostname }}/{{ elk_self.hostname }}.csr"
    dest: "{{ elasticsearch_ssl_directory }}/{{ elk_self.hostname }}.csr"
    owner: elasticsearch
    group: elasticsearch
    mode: '0664'
  when: inventory_hostname in groups['elasticsearch']

- name: Copy over CA to Elasticsearch host
  copy:
    src: "{{ cluster_ssl_ca_directory }}/ca.crt"
    dest: "{{ elasticsearch_ssl_directory }}/ca.crt"
    owner: elasticsearch
    group: elasticsearch
    mode: '0664'
  when: inventory_hostname in groups['elasticsearch']

# Logstash
- name: Copy Logstash cert
  copy:
    src: "{{ cluster_ssl_directory }}/{{ elk_self.hostname }}/{{ elk_self.hostname }}.crt"
    dest: "{{ logstash_ssl_directory }}/{{ elk_self.hostname }}.crt"
    owner: logstash
    group: logstash
    mode: '0664'
  when: inventory_hostname in groups['logstash']

- name: Copy Logstash key
  copy:
    src: "{{ cluster_ssl_directory }}/{{ elk_self.hostname }}/{{ elk_self.hostname }}.key"
    dest: "{{ logstash_ssl_directory }}/{{ elk_self.hostname }}.key"
    owner: logstash
    group: logstash
    mode: '0600'
  when: inventory_hostname in groups['logstash']

- name: Copy Logstash CSR
  copy:
    src: "{{ cluster_ssl_directory }}/{{ elk_self.hostname }}/{{ elk_self.hostname }}.csr"
    dest: "{{ logstash_ssl_directory }}/{{ elk_self.hostname }}.csr"
    owner: logstash
    group: logstash
    mode: '0664'
  when: inventory_hostname in groups['logstash']

- name: Copy over CA to Logstash host
  copy:
    src: "{{ cluster_ssl_ca_directory }}/ca.crt"
    dest: "{{ logstash_ssl_directory }}/ca.crt"
    owner: logstash
    group: logstash
    mode: '0664'
  when: inventory_hostname in groups['logstash']

# Kibana

- name: Copy Kibana cert
  copy:
    src: "{{ cluster_ssl_directory }}/{{ elk_self.hostname }}/{{ elk_self.hostname }}.crt"
    dest: "{{ kibana_ssl_directory }}/{{ elk_self.hostname }}.crt"
    owner: kibana
    group: kibana
    mode: '0664'
  when: inventory_hostname in groups['provisioner']

- name: Copy Kibana key
  copy:
    src: "{{ cluster_ssl_directory }}/{{ elk_self.hostname }}/{{ elk_self.hostname }}.key"
    dest: "{{ kibana_ssl_directory }}/{{ elk_self.hostname }}.key"
    owner: kibana
    group: kibana
    mode: '0600'
  when: inventory_hostname in groups['provisioner']

- name: Copy Kibana CSR
  copy:
    src: "{{ cluster_ssl_directory }}/{{ elk_self.hostname }}/{{ elk_self.hostname }}.csr"
    dest: "{{ kibana_ssl_directory }}/{{ elk_self.hostname }}.csr"
    owner: kibana
    group: kibana
    mode: '0664'
  when: inventory_hostname in groups['provisioner']

- name: Copy over CA to Kibana host
  copy:
    src: "{{ cluster_ssl_ca_directory }}/ca.crt"
    dest: "{{ kibana_ssl_directory }}/ca.crt"
    owner: kibana
    group: kibana
    mode: '0664'
  when: inventory_hostname in groups['provisioner']
