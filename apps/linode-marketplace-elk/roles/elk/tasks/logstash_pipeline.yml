---
- name: Adding Logstash pipeline file
  template:
    src: templates/logstash-pipeline.conf.j2
    dest: "/etc/logstash/conf.d/example-pipeline.conf"
    owner: logstash
    group: logstash
    mode: '0644'
  when: inventory_hostname in groups['logstash']

- name: Restart Logstash
  systemd_service:
    name: logstash
    state: restarted
    enabled: true
  when: inventory_hostname in groups['logstash']
