---
- name: Backup Kibana config
  copy:
    src: "{{ kibana_config }}"
    dest: "{{ kibana_config }}.bak"
    remote_src: true
    owner: kibana
    group: kibana
    mode: '0644'
  when: inventory_hostname in groups['provisioner']

- name: Generate Kibana encryption keys
  shell:
    cmd: |
      /usr/share/kibana/bin/kibana-encryption-keys generate
  no_log: true
  run_once: true
  delegate_to: localhost
  register: kibana_encryption_keys

- name: Update Kibana config
  template:
    src: templates/kibana.yml.j2
    dest: "{{ kibana_config }}"
    owner: kibana
    group: kibana
    mode: '0644'
    trim_blocks: false
  when: inventory_hostname in groups['provisioner']

- name: Restart Kibana
  systemd_service:
    name: kibana
    state: restarted
    enabled: true
  when: inventory_hostname in groups['provisioner']
