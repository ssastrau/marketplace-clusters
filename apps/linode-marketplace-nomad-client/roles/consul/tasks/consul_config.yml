---
- name: Creating consul config dir
  ansible.builtin.file:
    path: /etc/consul.d
    state: directory
    mode: '0755'
  when: cluster_mode == "client"

- name: Moving consul.hcl
  template:
    src: ../templates/consul.hcl.j2
    dest: /etc/consul.d/consul.hcl
    owner: root
    group: root
    mode: '0755'
  when: cluster_mode == "client"

- name: Create ACL dir
  ansible.builtin.file:
    path: /ops/shared/config
    state: directory
    mode: '0755'
  when: cluster_mode == "client"
