---
# roles/common/tasks
# Each node identifies itself by the private IP on its own NIC, then looks up
# its entry in nomad_data. Replaces the run_once + delegate_to: "{{ item }}"
# + loop idiom, which collapsed onto the provisioner on newer ansible-core.
- name: Determine this node's private IP
  set_fact:
    node_private_ip: "{{ ansible_all_ipv4_addresses | select('match', '^(10\\.|192\\.168\\.|172\\.(1[6-9]|2[0-9]|3[01])\\.)') | first }}"

- name: Identify this node's entry in the cluster topology
  set_fact:
    nomad_self: >-
      {{ ((nomad_data.server | default([])) + (nomad_data.client | default([])))
      | map(attribute='instance')
      | selectattr('ip_priv1', 'equalto', node_private_ip) | first }}

- name: Verify this node was matched in the cluster topology
  assert:
    that:
      - nomad_self is defined
      - nomad_self.ip_priv1 == node_private_ip
    fail_msg: "Could not match this node's private IP {{ node_private_ip }} to any nomad_data entry"

- name: Configure hostnames
  hostname:
    use: systemd
    name: '{{ nomad_self.hostname }}'

- name: Update /etc/hosts on all of the nodes
  blockinfile:
    path: /etc/hosts
    marker: '# {mark} nomad servers'
    block: |
      #jinja2: trim_blocks:False
      # nomad{%- for count in range(cluster_size) %}
      {{ nomad_data.client[count].instance.ip_priv1 }} {{ nomad_data.client[count].instance.hostname }}
      {%- endfor %}
  when:
    - cluster_mode == 'client'
    - is_provisioner == 'true'

# allows cluster play to use correct client var
- name: Update /etc/hosts on all of the nodes
  blockinfile:
    path: /etc/hosts
    marker: '# {mark} nomad servers'
    block: |
      #jinja2: trim_blocks:False
      # nomad{%- for count in range(clients) %}
      {{ nomad_data.client[count].instance.ip_priv1 }} {{ nomad_data.client[count].instance.hostname }}
      {%- endfor %}
  when: [cluster_mode == 'client', is_provisioner == 'false']

- name: Update system packages
  import_role:
    name: update_pkgs

- name: Install basic packages
  apt:
    pkg:
      - htop
      - rsync
      - software-properties-common
      - gnupg2
      - ssl-cert
      - python3-redis
      - python3-passlib
    state: present

- name: Configure firewalld
  import_tasks: firewall.yml

- name: Add docker repo key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Adding docker repo
  apt_repository:
    repo: deb https://download.docker.com/linux/ubuntu noble stable

- name: Install docker-ce
  apt:
    name: docker-ce
    state: latest
    update_cache: true

- name: Secure ssh
  import_role:
    name: securessh
  when: disable_root is defined
