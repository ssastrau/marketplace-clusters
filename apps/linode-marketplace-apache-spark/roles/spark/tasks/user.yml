---
# Create spark system user and group
- name: Check if spark group exists
  getent:
    database: group
    key: spark
  ignore_errors: true
  register: groupcheck

- name: Create spark group
  group:
    name: spark
    state: present
    system: true
  when: groupcheck is failed

- name: Check if spark user exists
  getent:
    database: passwd
    key: spark
  ignore_errors: true
  register: usercheck

- name: Create spark user
  user:
    name: spark
    group: spark
    shell: /bin/bash
    expires: -1
    create_home: true
    home: "{{ spark_home }}"
    system: true
    state: present
  when: usercheck is failed

- name: Set permissions on spark home directory
  file:
    path: "{{ spark_home }}"
    owner: spark
    group: spark
    mode: "0750"
