---
# vm configs
- name: Disable THP
  copy:
    src: 'files/disable-thp.service'
    dest: '/etc/systemd/system/disable-thp.service'
    mode: '0644'

- name: Reload and enable
  systemd:
    name: disable-thp.service
    state: started
    enabled: true
    daemon_reload: true

- name: Set swappiness
  sysctl:
    name: vm.swappiness
    value: '1'
    state: present
    reload: true

# Each node identifies itself by the private IP on its own NIC, then looks up
# its entry in couchbase_data. Replaces the run_once + delegate_to: "{{ item }}"
# + loop idiom, which collapsed onto the provisioner on newer ansible-core.
- name: Determine this node's private IP
  set_fact:
    node_private_ip: "{{ ansible_all_ipv4_addresses | select('match', '^(10\\.|192\\.168\\.|172\\.(1[6-9]|2[0-9]|3[01])\\.)') | first }}"

- name: Identify this node's entry in the cluster topology
  set_fact:
    couchbase_self: "{{ couchbase_data.server | map(attribute='instance') | selectattr('ip_priv1', 'equalto', node_private_ip) | first }}"

- name: Verify this node was matched in the cluster topology
  assert:
    that:
      - couchbase_self is defined
      - couchbase_self.ip_priv1 == node_private_ip
    fail_msg: "Could not match this node's private IP {{ node_private_ip }} to any couchbase_data.server entry"

- name: Configure hostname for cluster nodes
  hostname:
    use: systemd
    name: '{{ couchbase_self.hostname }}'

- name: Update /etc/hosts on all of the nodes
  blockinfile:
    path: /etc/hosts
    marker: "# {mark} couchbase servers"
    block: |
      #jinja2: trim_blocks:False
      # couchbase
      {%- for count in range(server_count | int) %}
      {{ couchbase_data.server[count].instance.ip_priv1 }} {{ couchbase_data.server[count].instance.hostname }}
      {%- endfor %}

- name: Update system packages
  import_role:
    name: update_pkgs

- name: Install basic packages
  apt:
    pkg:
      - net-tools
      - htop
      - rsync
      - software-properties-common
      - gnupg2
      - ssl-cert
      - python3-passlib
      - ufw
    state: present

# Set _domain variable
- name: Set _domain variable
  import_role:
    name: setdomain
  run_once: true
  delegate_to: localhost

# dns creation
- name: Create dns A record
  import_role:
    name: create_dns_record
  when: [token_password is defined, default_dns is not defined]
  run_once: true
  delegate_to: localhost

# disable root login w/wo pubkey
- name: Secure ssh
  import_role:
    name: securessh
  when: disable_root is defined

# ufw_install
- name: Enabling ufw
  import_role:
    name: ufw

# ufw rules
- name: Apply ufw rules
  import_tasks: ufw_rules.yml

# fail2ban
- name: Enabling fail2ban
  import_role:
    name: fail2ban_install
