---
# destroy linodes
- name: Destroying Linodes
  hosts: localhost
  connection: local
  vars_files: [group_vars/couchbase/vars]

  tasks:
    - name: Deleting linodes except provisioner
      linode.cloud.instance:
        label: 'couchbase-instance-{{ item | int + 1 }}-{{ uuid }}'
        api_token: '{{ api_token }}'
        state: absent
      with_sequence: count='{{ server_count }}'
