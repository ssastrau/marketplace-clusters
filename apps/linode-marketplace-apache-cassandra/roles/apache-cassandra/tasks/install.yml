---
# install cassandra
- name: Download Apache Cassandra GPG key
  get_url:
    url: 'https://downloads.apache.org/cassandra/KEYS'
    dest: '/etc/apt/keyrings/apache-cassandra.asc'
    mode: '0644'

- name: Adding cassandra repository
  apt_repository:
    repo: 'deb [signed-by=/etc/apt/keyrings/apache-cassandra.asc] https://debian.cassandra.apache.org 41x main'
    state: present

- name: Install basic packages
  apt:
    pkg: [cassandra, cassandra-tools, python3-pip]
    state: present
    update_cache: true

- name: Install cqlsh via pip
  command: /usr/bin/python3 -m pip install --break-system-packages --upgrade cqlsh==6.2.1

- name: Replace system cqlsh wrapper with pip version
  copy:
    dest: /usr/bin/cqlsh
    content: |
      #!/bin/sh
      exec /usr/local/bin/cqlsh "$@"
    mode: '0755'

- name: Verify cqlsh is available
  command: /usr/bin/cqlsh --version

- name: Stop cassandra to configure cluster
  systemd:
    name: cassandra
    state: stopped

# remove datadir to reconfigure cluster with new name
- name: Remove cassandra data directory
  file:
    path: '{{ cassandra_datadir }}'
    state: absent

- name: Create /var/lib/cassandra directory
  file:
    path: '{{ cassandra_datadir }}'
    state: directory
    owner: cassandra
    group: cassandra
    mode: '0755'
