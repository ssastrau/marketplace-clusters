---
# configure hostname and hosts file

# Each node identifies itself by the private IP actually on its NIC, then
# looks up its own entry in cassandra_data. This replaces the previous
# run_once + delegate_to: "{{ item }}" + loop idiom, which collapsed every
# iteration onto the provisioner (so it took the last row of cassandra_data
# and the remote nodes were never configured).
- name: Determine this node's private IP
  set_fact:
    node_private_ip: "{{ ansible_all_ipv4_addresses | select('match', '^(10\\.|192\\.168\\.|172\\.(1[6-9]|2[0-9]|3[01])\\.)') | first }}"

- name: Identify this node's entry in the cluster topology
  set_fact:
    cassandra_self: "{{ cassandra_data.server | map(attribute='instance') | selectattr('ip_priv1', 'equalto', node_private_ip) | first }}"

- name: Verify this node was matched in the cluster topology
  assert:
    that:
      - cassandra_self is defined
      - cassandra_self.ip_priv1 == node_private_ip
    fail_msg: "Could not match this node's private IP {{ node_private_ip }} to any cassandra_data.server entry"

- name: Configure hostnames
  hostname:
    use: systemd
    name: "{{ cassandra_self.hostname }}"

- name: Update /etc/hosts on all of the nodes
  blockinfile:
    path: /etc/hosts
    marker: "# {mark} cassandra servers"
    block: |
      #jinja2: trim_blocks:False
      # Cassandra
      {%- for count in range(cluster_size) %}
      {{ cassandra_data.server[count].instance.ip_priv1 }} {{ cassandra_data.server[count].instance.hostname }}
      {%- endfor %}
