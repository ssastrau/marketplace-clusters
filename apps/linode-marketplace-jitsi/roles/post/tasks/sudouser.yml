---
- name: Generating sudo user password
  set_fact:
    sudo_password: "{{ password }}"
  no_log: true
  run_once: true
  delegate_to: "localhost"

- name: Set sudo user
  user:
    name: "{{ username }}"
    shell: /bin/bash
    groups: sudo
    password: "{{ sudo_password | password_hash('sha512') }}"
    update_password: on_create
    expires: -1
    append: true
    generate_ssh_key: true
    ssh_key_bits: 4096
    ssh_key_file: .ssh/id_rsa
    state: present
