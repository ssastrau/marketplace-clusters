---
# roles/jitsi/tasks/jitsi.yml
- name: Set jitsi jvb conf
  debconf:
    name: jitsi-videobridge
    question: jitsi-videobridge/jvb-hostname
    value: "{{ _domain }}"
    vtype: string

- name: Set jitsi web config
  debconf:
    name: jitsi-meet-web-config
    question: jitsi-meet/cert-choice
    value: "Generate a new self-signed certificate (You will later get a chance to obtain a Let's encrypt certificate)'"
    vtype: select

- name: Install lua5.4
  apt:
    pkg: lua5.4
    state: present
  run_once: true
  delegate_to: "{{ item }}"
  loop: "{{ groups['jitsi_servers'] }}"

- name: Pin lua5.4 as default lua interpreter
  shell: update-alternatives --set lua-interpreter /usr/bin/lua5.4
  args:
    executable: /bin/bash
  run_once: true
  delegate_to: "{{ item }}"
  loop: "{{ groups['jitsi_servers'] }}"

- name: Installing full jitsi meet suite on jitsi instances only
  apt:
    pkg: jitsi-meet
    state: present
    lock_timeout: 5
  run_once: true
  delegate_to: "{{ item }}"
  loop: "{{ groups['jitsi_servers'] }}"

- name: Installing let's encrypt certificate
  shell:
    cmd: |
      set -o pipefail
      echo {{ soa_email_address }} | /usr/share/jitsi-meet/scripts/install-letsencrypt-cert.sh
    executable: /bin/bash
  run_once: true
  delegate_to: "{{ item }}"
  loop: "{{ groups['jitsi_servers'] }}"

- name: Installing JVB on video bridges
  apt:
    pkg: jitsi-videobridge2
    lock_timeout: 5
    state: present
  run_once: true
  delegate_to: "{{ item }}"
  loop: "{{ groups['jvb_servers'] }}"
