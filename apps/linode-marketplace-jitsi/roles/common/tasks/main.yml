---
# roles/common/tasks/main.yml

# common tasks for all linodes
- name: Force ipv4 with apt
  copy:
    content: 'Acquire::ForceIPv4 "true";'
    dest: /etc/apt/apt.conf.d/99force-ipv4
    mode: '0600'

- name: Apt update
  apt:
    update_cache: true

- name: Apt upgrade
  apt:
    upgrade: full

- name: Install basic packages
  apt:
    pkg:
      - ntp
      - gnupg2
      - wget
      - curl
      - htop
      - rsync
      - fail2ban
      - python3-pip
      - python3-mysqldb
      - net-tools
      - apt-transport-https
      - lua5.2
      - ufw
    state: present

# remove fail2ban
- name: Fail2ban jail.local
  copy:
    src: /etc/fail2ban/jail.conf
    dest: /etc/fail2ban/jail.local
    remote_src: true
    mode: '0600'
  notify: start fail2ban

- name: Secure ssh configs
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
  with_items:
    - { regexp: '^\#?PermitRootLogin (yes|no)', line: 'PermitRootLogin without-password' }
    - { regexp: '^\#?PasswordAuthentication (yes|no)', line: 'PasswordAuthentication no' }
    - { regexp: '^\#?PubkeyAuthentication (yes|no)', line: 'PubkeyAuthentication yes' }
  notify: restart ssh

- name: Apply ufw rules
  import_tasks: ufw_rules.yml

- name: Set _domain variable
  import_tasks: domain.yml
  run_once: true
  delegate_to: "localhost"

# dns creation
- name: Create dns A record
  import_tasks: create_dns_record.yml
  run_once: true
  delegate_to: localhost
  when: [token_password is defined, default_dns is not defined]
