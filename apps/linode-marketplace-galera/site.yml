---
# linode galera ansible playbook

# cluster pre-check
- name: Pre-check
  hosts: galera_servers
  user: root
  vars_files: [group_vars/galera/vars, group_vars/galera/secret_vars]
  roles:
    - precheck

# linodes
- name: Configure galera linodes
  hosts: galera_servers
  any_errors_fatal: true
  user: root
  vars:
    local_home: "{{ lookup('env','HOME') }}"
  vars_files: [group_vars/galera/vars, group_vars/galera/secret_vars]
  roles: [common, db, post]
