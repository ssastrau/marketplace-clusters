---
# apt_setup_update
- name: Update system packages
  import_role:
    name: update_pkgs

- name: Install basic packages
  apt:
    pkg:
      - ntp
      - wget
      - curl
      - htop
      - rsync
      - python3
      - python3-passlib
      - fail2ban
      - ufw
    state: latest

# Set _domain variable
- name: Set _domain variable
  import_role:
    name: setdomain
  run_once: true
  delegate_to: localhost

# dns creation
- name: Create dns A record
  import_role:
    name: create_dns_record
  when:
    - token_password is defined
    - default_dns is not defined
  run_once: true
  delegate_to: localhost

# disable root login w/wo pubkey
- name: Secure ssh
  import_role:
    name: securessh
  when: disable_root is defined

# ufw_install
- name: Enabling ufw
  import_role:
    name: ufw

# ufw rules
- name: Apply ufw rules
  import_tasks: ufw_rules.yml

# fail2ban
- name: Enabling fail2ban
  import_role:
    name: fail2ban_install
