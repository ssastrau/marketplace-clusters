---
# Each node identifies itself by the private IP on its own NIC, then looks up
# its entry in gluster_data. Replaces the run_once + delegate_to: "{{ item }}"
# + loop idiom, which collapsed onto the provisioner on newer ansible-core
# (so peer nodes never had their hostname set and the peer pool probe failed).
- name: Determine this node's private IP
  set_fact:
    node_private_ip: "{{ ansible_all_ipv4_addresses | select('match', '^(10\\.|192\\.168\\.|172\\.(1[6-9]|2[0-9]|3[01])\\.)') | first }}"

- name: Identify this node's entry in the cluster topology
  set_fact:
    gluster_self: "{{ gluster_data.server | map(attribute='instance') | selectattr('ip_priv1', 'equalto', node_private_ip) | first }}"

- name: Verify this node was matched in the cluster topology
  assert:
    that:
      - gluster_self is defined
      - gluster_self.ip_priv1 == node_private_ip
    fail_msg: "Could not match this node's private IP {{ node_private_ip }} to any gluster_data.server entry"

- name: Update /etc/hosts
  blockinfile:
    path: /etc/hosts
    marker: "# {mark} GLUSTERFS HOSTS"
    block: |
      #jinja2: trim_blocks:False
      {%- for count in range(cluster_size) %}
      {{ gluster_data.server[count].instance.ip_priv1 }} {{ gluster_data.server[count].instance.hostname }}
      {%- endfor %}

- name: Configure hostnames
  hostname:
    use: systemd
    name: "{{ gluster_self.hostname }}"
