---
# destroy instances
- name: Destroying gluster instances
  hosts: localhost
  connection: local
  vars_files: [group_vars/gluster/vars, group_vars/gluster/secret_vars]
  vars:
    count: '{{ cluster_size - 1 }}'

  tasks:
    - name: Deleting instances except provisioner
      linode.cloud.instance:
        label: 'glusterfs-instance-{{ item | int + 1 }}-{{ uuid }}'
        api_token: '{{ token }}'
        state: absent
      with_sequence: count='{{ count }}'
