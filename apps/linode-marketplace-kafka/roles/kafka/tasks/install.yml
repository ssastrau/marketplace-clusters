---
# install kafka in cluster
- name: Create kafka config directory
  file:
    path: "{{ kafka_config_directory }}"
    state: directory
    mode: '0755'
    owner: kafka
    group: kafka

- name: Download kafka {{ kafka_version }}
  block:
    - name: Try downloading kafka from main repository
      get_url:
        url: "https://downloads.apache.org/kafka/{{ kafka_version }}/kafka_2.13-{{ kafka_version }}.tgz"
        dest: "/tmp/kafka_2.13-{{ kafka_version }}.tgz"
        mode: '0644'
  rescue:
    - name: Download kafka from archive repository
      get_url:
        url: "https://archive.apache.org/dist/kafka/{{ kafka_version }}/kafka_2.13-{{ kafka_version }}.tgz"
        dest: "/tmp/kafka_2.13-{{ kafka_version }}.tgz"
        mode: '0644'

- name: Untar kafka archive
  unarchive:
    src: "/tmp/kafka_2.13-{{ kafka_version }}.tgz"
    dest: "{{ kafka_config_directory }}"
    extra_opts: [--strip-components=1]

- name: Updating config directory ownership
  ansible.builtin.file:
    path: "{{ kafka_config_directory }}"
    state: directory
    recurse: true
    owner: kafka
    group: kafka

# Each node sets its own role facts from its own inventory `role`, then writes
# its own service file. Replaces the run_once + delegate_to + loop idiom.
- name: Set kafka role facts for this node
  set_fact:
    myrole: "{{ 'broker and controller' if role == 'controller and broker' else 'broker' }}"
    server_properties: "{{ '/etc/kafka/config/kraft/server.properties' if role == 'controller and broker' else '/etc/kafka/config/kraft/broker.properties' }}"

- name: Add kafka systemd service file
  template:
    src: templates/kafka.service.j2
    dest: /lib/systemd/system/kafka.service
    mode: '0644'
