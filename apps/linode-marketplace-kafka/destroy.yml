---
# destroy instances
- name: Destroying kafka instances
  hosts: localhost
  connection: local
  vars_files: [group_vars/kafka/vars]

  vars:
    count: '{{ cluster_size - 1 }}'

  tasks:
    - name: Deleting instances except provisioner
      linode.cloud.instance:
        label: 'kafka-instance-{{ item | int + 1 }}-{{ uuid }}'
        api_token: '{{ token }}'
        state: absent
      with_sequence: count='{{ count }}'
